<!-- Toolbar -->
<header class="app-toolbar">
  <div class="toolbar-inner">

    <!-- Logo -->
    <a routerLink="/" class="app-logo">
      <img
        *ngIf="logoUrl"
        [src]="logoUrl"
        alt="Logo"
        class="logo-img"
      />
      <span *ngIf="!logoUrl" class="logo-fallback">
        <mat-icon>receipt_long</mat-icon>
        <span class="logo-text">{{ 'APP.TITLE' | translate }}</span>
      </span>
    </a>

    <span class="spacer"></span>

    <!-- Navigation -->
    <nav class="nav-links">
      <a mat-button routerLink="/tours" routerLinkActive="active" (click)="onNavigate('/tours')">
        <mat-icon>tour</mat-icon>
        {{ 'NAV.TOURS' | translate }}
      </a>
      <a mat-button routerLink="/invoices" routerLinkActive="active" (click)="onNavigate('/invoices')">
        <mat-icon>receipt_long</mat-icon>
        {{ 'NAV.INVOICES' | translate }}
      </a>
      <a mat-button routerLink="/outlook" routerLinkActive="active" (click)="onNavigate('/outlook')">
        <mat-icon>mail_outline</mat-icon>
        Outlook
      </a>
      <a mat-button routerLink="/settings" routerLinkActive="active" (click)="onNavigate('/settings')">
        <mat-icon>settings</mat-icon>
        {{ 'NAV.SETTINGS' | translate }}
      </a>
    </nav>

    <!-- Language Switcher -->
    <app-language-switcher></app-language-switcher>

  </div>
</header>

<!-- Main Content -->
<div class="app-container">
  <router-outlet></router-outlet>
</div>
