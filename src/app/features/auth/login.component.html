<div class="auth-page">
  <mat-card class="auth-card">
    <div class="auth-head">
      <mat-icon>receipt_long</mat-icon>
      <h1>{{ 'APP.TITLE' | translate }}</h1>
      <p class="auth-sub">{{ mode === 'signin' ? 'Sign in to your account' : 'Create your account' }}</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="username" />
        <mat-error *ngIf="form.controls.email.hasError('required')">Email is required.</mat-error>
        <mat-error *ngIf="form.controls.email.hasError('email')">Enter a valid email.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password"
               [autocomplete]="mode === 'signin' ? 'current-password' : 'new-password'" />
        <mat-error *ngIf="form.controls.password.hasError('required')">Password is required.</mat-error>
        <mat-error *ngIf="form.controls.password.hasError('minlength')">At least 6 characters.</mat-error>
      </mat-form-field>

      <app-banner *ngIf="error" type="error" icon="error_outline" (dismissed)="error = null">
        {{ error }}
      </app-banner>
      <app-banner *ngIf="info" icon="info_outline" (dismissed)="info = null">
        {{ info }}
      </app-banner>

      <button mat-raised-button color="primary" type="submit" class="auth-submit" [disabled]="loading">
        <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
        <span *ngIf="!loading">{{ mode === 'signin' ? 'Sign in' : 'Sign up' }}</span>
      </button>
    </form>

    <div class="auth-switch">
      <ng-container *ngIf="mode === 'signin'; else toSignin">
        No account?
        <button mat-button color="primary" type="button" (click)="setMode('signup')">Sign up</button>
      </ng-container>
      <ng-template #toSignin>
        Already have an account?
        <button mat-button color="primary" type="button" (click)="setMode('signin')">Sign in</button>
      </ng-template>
    </div>
  </mat-card>
</div>
